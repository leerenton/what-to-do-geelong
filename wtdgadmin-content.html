<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content — WTDG Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/wtdgadmin.css?v=2" />
  <!-- Quill WYSIWYG -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <meta name="robots" content="noindex, nofollow" />
  <style>
    /* Quill dark-mode overrides */
    .ql-toolbar.ql-snow {
      background: var(--adm-card2); border-color: var(--adm-border) !important;
      border-radius: .45rem .45rem 0 0;
    }
    .ql-container.ql-snow {
      background: var(--adm-card); border-color: var(--adm-border) !important;
      border-radius: 0 0 .45rem .45rem; color: var(--adm-text);
      font-family: 'DM Sans', sans-serif; font-size: .9rem; min-height: 280px;
    }
    .ql-editor { min-height: 280px; }
    .ql-snow .ql-stroke { stroke: var(--adm-mid) !important; }
    .ql-snow .ql-fill  { fill:   var(--adm-mid) !important; }
    .ql-snow .ql-picker-label { color: var(--adm-mid) !important; }
    .ql-snow .ql-picker-options { background: var(--adm-card) !important; border-color: var(--adm-border) !important; }
    .ql-snow .ql-picker-item { color: var(--adm-text) !important; }
    .ql-snow.ql-toolbar button:hover .ql-stroke,
    .ql-snow.ql-toolbar button.ql-active .ql-stroke { stroke: var(--adm-teal) !important; }
    .ql-snow.ql-toolbar button:hover .ql-fill,
    .ql-snow.ql-toolbar button.ql-active .ql-fill  { fill:   var(--adm-teal) !important; }
    .ql-snow .ql-picker-label:hover,
    .ql-snow .ql-picker-label.ql-active { color: var(--adm-teal) !important; }
    .ql-editor p, .ql-editor h2, .ql-editor h3 { margin-bottom: .5rem; }
    .ql-editor blockquote { border-left: 3px solid var(--adm-teal); padding-left: .85rem; color: var(--adm-mid); }
    .ql-editor a { color: var(--adm-teal); }

    /* Tab system */
    .adm-tabs { display: flex; gap: .35rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--adm-border); }
    .adm-tab {
      padding: .6rem 1.1rem; font-size: .85rem; font-weight: 600;
      color: var(--adm-mid); cursor: pointer; border: none; background: none;
      font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .adm-tab:hover { color: var(--adm-text); }
    .adm-tab.active { color: var(--adm-teal); border-bottom-color: var(--adm-teal); }
    .adm-tab-panel { display: none; }
    .adm-tab-panel.active { display: block; }
  </style>
</head>
<body class="adm-body">

<!-- Drawer overlay -->
<div class="adm-drawer-overlay" id="js-drawer-overlay"></div>

<!-- Article Edit Drawer -->
<div class="adm-drawer" id="js-art-drawer" style="width:min(720px,100vw)">
  <div class="adm-drawer__head">
    <h2 class="adm-drawer__title" id="js-drawer-title">New Article</h2>
    <button class="adm-drawer__close" id="js-drawer-close">✕</button>
  </div>
  <div class="adm-drawer__body">

    <div class="adm-field">
      <label>Headline *</label>
      <input type="text" id="af-title" placeholder="Article headline" />
    </div>
    <div class="adm-field-row">
      <div class="adm-field">
        <label>Type</label>
        <select id="af-type">
          <option value="guide">Guide</option>
          <option value="news">News</option>
          <option value="history">What Was Geelong</option>
          <option value="feature">Feature</option>
        </select>
      </div>
      <div class="adm-field">
        <label>Associate to Business</label>
        <select id="af-business"><option value="">None</option></select>
      </div>
    </div>
    <div class="adm-field-row">
      <div class="adm-field">
        <label>Slug (URL)</label>
        <input type="text" id="af-slug" placeholder="auto-generated from title" />
      </div>
      <div class="adm-field">
        <label>Tags (comma separated)</label>
        <input type="text" id="af-tags" placeholder="geelong, food, news" />
      </div>
    </div>
    <div class="adm-field">
      <label>Excerpt / Summary</label>
      <textarea id="af-excerpt" rows="2" placeholder="Short description shown on article cards…"></textarea>
    </div>

    <!-- Hero image with upload -->
    <div class="adm-field">
      <label>Hero Image</label>
      <div class="adm-upload-zone" id="af-img-zone">
        <input type="file" id="af-img-file" accept="image/*" />
        📷 Drop a hero image here or click to upload
      </div>
      <img class="adm-upload-preview" id="af-img-preview" style="display:none;max-height:200px" alt="" />
      <input type="url" id="af-img" placeholder="Or paste an image URL (Unsplash etc.)…" style="margin-top:.4rem" />
    </div>

    <!-- WYSIWYG -->
    <div class="adm-field">
      <label>Content</label>
      <div id="af-quill-editor"></div>
      <!-- Hidden textarea holds HTML for save -->
      <textarea id="af-content" style="display:none"></textarea>
    </div>

    <!-- Inline image upload helper note -->
    <p style="font-size:.75rem;color:var(--adm-mid);margin-top:.35rem">
      💡 To insert an image inside the article: click the 📷 button in the Quill toolbar — it opens a file picker and uploads directly to storage.
    </p>

  </div>
  <div class="adm-drawer__footer">
    <button class="adm-btn adm-btn--sm" id="js-art-save">Save Article</button>
    <button class="adm-btn adm-btn--outline adm-btn--sm" id="js-art-cancel">Cancel</button>
    <span id="js-art-save-status" style="font-size:.82rem;margin-left:.5rem"></span>
    <button class="adm-btn adm-btn--sm" style="background:var(--adm-red);margin-left:auto" id="js-art-delete" hidden>Delete</button>
  </div>
</div>

<div class="adm-layout">
  <aside class="adm-sidebar" id="js-adm-sidebar"></aside>
  <div class="adm-main">
    <div class="adm-topbar">
      <span class="adm-topbar__title" id="js-adm-page-title">Content</span>
      <div class="adm-topbar__right">
        <button class="adm-btn adm-btn--sm" id="js-new-article-btn">+ New Article</button>
      </div>
    </div>
    <div class="adm-content">
      <div class="adm-tabs">
        <button class="adm-tab active" data-tab="articles">Articles / News</button>
        <button class="adm-tab" data-tab="submissions">Business Submissions</button>
      </div>

      <!-- Articles -->
      <div class="adm-tab-panel active" id="js-tab-articles">
        <div class="adm-toolbar">
          <div class="adm-search">
            <span class="adm-search__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="search" id="js-art-search" placeholder="Search articles…" />
          </div>
          <select class="adm-select" id="js-art-type">
            <option value="">All types</option>
            <option value="guide">Guide</option><option value="news">News</option>
            <option value="history">History</option><option value="feature">Feature</option>
          </select>
        </div>
        <div class="adm-table-wrap" id="js-articles-table">
          <div class="adm-table-empty">Loading articles…</div>
        </div>
      </div>

      <!-- Submissions -->
      <div class="adm-tab-panel" id="js-tab-submissions">
        <div class="adm-toolbar">
          <div class="adm-search">
            <span class="adm-search__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="search" id="js-sub-search" placeholder="Search submissions…" />
          </div>
          <select class="adm-select" id="js-sub-status">
            <option value="">All statuses</option>
            <option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="adm-table-wrap" id="js-submissions-table">
          <div class="adm-table-empty">Loading submissions…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="/supabase.js?v=2"></script>
<script src="/wtdgadmin.js?v=1"></script>
<script src="/wtdgadmin-shell.js?v=1"></script>
<script src="/wtdgadmin-upload.js"></script>
<script>
let allArticles = [], allBizList = [], allSubmissions = [];
let editingId = null, quill = null;

document.addEventListener('DOMContentLoaded', async () => {
  const admin = await requireAdminAuth();
  if (!admin) return;
  initAdminShell('Content');
  setupTabs();
  initQuill();

  document.getElementById('js-new-article-btn').addEventListener('click', () => openDrawer(null));
  document.getElementById('js-drawer-close').addEventListener('click', closeDrawer);
  document.getElementById('js-art-cancel').addEventListener('click', closeDrawer);
  document.getElementById('js-drawer-overlay').addEventListener('click', closeDrawer);
  document.getElementById('js-art-save').addEventListener('click', saveArticle);
  document.getElementById('js-art-delete').addEventListener('click', deleteArticle);

  ['js-art-search','js-art-type'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', renderArticles);
    document.getElementById(id)?.addEventListener('change', renderArticles);
  });
  ['js-sub-search','js-sub-status'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', renderSubmissions);
    document.getElementById(id)?.addEventListener('change', renderSubmissions);
  });

  document.getElementById('af-title').addEventListener('input', () => {
    if (!editingId) {
      const t = document.getElementById('af-title').value;
      document.getElementById('af-slug').value = t.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    }
  });

  // Bind hero image upload ONCE at init — not on every drawer open
  bindUploadZone({
    zoneEl:    document.getElementById('af-img-zone'),
    fileInput: document.getElementById('af-img-file'),
    urlInput:  document.getElementById('af-img'),
    previewEl: document.getElementById('af-img-preview'),
    folder:    'articles',
  });

  await Promise.all([loadArticles(), loadBizList(), loadSubmissions()]);
});

// ── Quill WYSIWYG ─────────────────────────────────────────
function initQuill() {
  // Custom image handler — uploads to Supabase Storage then inserts into editor
  function imageHandler() {
    const input = document.createElement('input');
    input.setAttribute('type', 'file');
    input.setAttribute('accept', 'image/*');
    input.click();
    input.onchange = async () => {
      const file = input.files[0];
      if (!file) return;
      const range = quill.getSelection(true);
      quill.insertText(range.index, '⏳ Uploading image…', 'user');
      const url = await uploadMediaFile(file, 'articles');
      quill.deleteText(range.index, 19); // remove placeholder
      if (url) {
        quill.insertEmbed(range.index, 'image', url, 'user');
        quill.setSelection(range.index + 1);
      } else {
        quill.insertText(range.index, '[Upload failed]', 'user');
      }
    };
  }

  quill = new Quill('#af-quill-editor', {
    theme: 'snow',
    modules: {
      toolbar: {
        container: [
          [{ header: [2, 3, false] }],
          ['bold', 'italic', 'underline'],
          ['blockquote', 'link'],
          [{ list: 'ordered' }, { list: 'bullet' }],
          ['image'],
          ['clean'],
        ],
        handlers: { image: imageHandler },
      },
    },
  });
}

// ── Tabs ──────────────────────────────────────────────────
function setupTabs() {
  document.querySelectorAll('.adm-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.adm-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.adm-tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`js-tab-${tab.dataset.tab}`).classList.add('active');
    });
  });
}

// ── Articles ──────────────────────────────────────────────
async function loadArticles() {
  const { data } = await db.from('articles').select('*').order('created_at', { ascending: false });
  allArticles = data || [];
  renderArticles();
}

async function loadBizList() {
  const { data } = await db.from('businesses').select('id,name').order('name');
  allBizList = data || [];
  const sel = document.getElementById('af-business');
  allBizList.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.id; opt.textContent = b.name;
    sel.appendChild(opt);
  });
}

function renderArticles() {
  const q    = document.getElementById('js-art-search').value.toLowerCase();
  const type = document.getElementById('js-art-type').value;
  let list = allArticles.filter(a =>
    (!q    || (a.title||'').toLowerCase().includes(q)) &&
    (!type || a.type === type)
  );
  if (!list.length) {
    document.getElementById('js-articles-table').innerHTML = '<div class="adm-table-empty">No articles found.</div>';
    return;
  }
  const rows = list.map(a => `
    <tr>
      <td>
        ${a.hero_img ? `<img src="${a.hero_img}" style="width:48px;height:36px;object-fit:cover;border-radius:.35rem;margin-right:.5rem;vertical-align:middle" />` : ''}
        <strong>${a.title||'—'}</strong>
        <div style="font-size:.75rem;color:var(--adm-mid);margin-top:.1rem">${a.slug||''}</div>
      </td>
      <td><span class="adm-badge adm-badge--blue">${a.type||'—'}</span></td>
      <td style="font-size:.78rem;color:var(--adm-mid)">${fmtDate(a.created_at||a.published_at)}</td>
      <td style="display:flex;gap:.3rem;flex-wrap:wrap">
        <button class="adm-btn adm-btn--sm adm-btn--outline" onclick="openDrawer('${a.id}')">Edit</button>
        <a href="article.html?s=${a.slug}" target="_blank" class="adm-btn adm-btn--outline adm-btn--sm">View</a>
      </td>
    </tr>`).join('');
  document.getElementById('js-articles-table').innerHTML = `
    <table class="adm-table">
      <thead><tr><th>Title</th><th>Type</th><th>Date</th><th>Actions</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function openDrawer(id) {
  editingId = id;
  const a = id ? allArticles.find(x => String(x.id) === String(id)) : null;
  document.getElementById('js-drawer-title').textContent = a ? 'Edit Article' : 'New Article';
  document.getElementById('af-title').value    = a?.title    || '';
  document.getElementById('af-type').value     = a?.type     || 'news';
  document.getElementById('af-business').value = (a?.business_ids || [])[0] || '';
  document.getElementById('af-slug').value     = a?.slug     || '';
  document.getElementById('af-tags').value     = (a?.tags || []).join(', ');
  document.getElementById('af-excerpt').value  = a?.excerpt  || '';
  document.getElementById('af-img').value      = a?.hero_img || '';

  // Load content into Quill
  if (quill) {
    quill.root.innerHTML = a?.content || '';
  }

  const prev = document.getElementById('af-img-preview');
  const heroImg = a?.hero_img || '';
  prev.src = heroImg; prev.style.display = heroImg ? 'block' : 'none';

  document.getElementById('js-art-delete').hidden = !a;
  document.getElementById('js-art-save-status').textContent = '';
  document.getElementById('js-art-drawer').classList.add('open');
  document.getElementById('js-drawer-overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('js-art-drawer').classList.remove('open');
  document.getElementById('js-drawer-overlay').classList.remove('open');
  editingId = null;
}

async function saveArticle() {
  const title = document.getElementById('af-title').value.trim();
  if (!title) { alert('Headline is required.'); return; }

  const slug = document.getElementById('af-slug').value.trim() ||
    title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

  // Get HTML from Quill
  const content = quill ? quill.root.innerHTML : document.getElementById('af-content').value;

  const payload = {
    title, slug,
    type:         document.getElementById('af-type').value,
    business_ids: document.getElementById('af-business').value ? [document.getElementById('af-business').value] : [],
    hero_img:     document.getElementById('af-img').value.trim() || null,
    tags:        document.getElementById('af-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    excerpt:     document.getElementById('af-excerpt').value.trim() || null,
    content,
  };

  const status = document.getElementById('js-art-save-status');
  status.textContent = 'Saving…'; status.style.color = 'var(--adm-mid)';

  let error;
  if (editingId) {
    ({ error } = await db.from('articles').update(payload).eq('id', editingId));
    if (!error) {
      const idx = allArticles.findIndex(a => String(a.id) === String(editingId));
      if (idx >= 0) allArticles[idx] = { ...allArticles[idx], ...payload };
      // Re-fetch just this article to get the true saved state
      const { data: fresh } = await db.from('articles').select('*').eq('id', editingId).single();
      if (fresh) allArticles[idx >= 0 ? idx : allArticles.length] = fresh;
    }
  } else {
    payload.id          = slug;
    payload.created_at  = new Date().toISOString();
    payload.published_at = new Date().toISOString().split('T')[0];
    ({ error } = await db.from('articles').insert(payload));
  }

  if (error) { status.textContent = '✗ ' + error.message; status.style.color = 'var(--adm-red)'; return; }
  status.textContent = '✓ Saved!'; status.style.color = 'var(--adm-green)';
  setTimeout(closeDrawer, 800);
  await loadArticles();
}

async function deleteArticle() {
  if (!editingId || !confirm('Delete this article permanently?')) return;
  const { error } = await db.from('articles').delete().eq('id', editingId);
  if (error) { alert('Delete failed: ' + error.message); return; }
  closeDrawer();
  await loadArticles();
}

// ── Submissions ────────────────────────────────────────────
async function loadSubmissions() {
  const { data } = await db.from('submissions').select('*').order('created_at', { ascending: false }).limit(200);
  allSubmissions = data || [];
  renderSubmissions();
}

function renderSubmissions() {
  const q      = document.getElementById('js-sub-search').value.toLowerCase();
  const status = document.getElementById('js-sub-status').value;
  let list = allSubmissions.filter(s =>
    (!q      || (s.title||s.name||'').toLowerCase().includes(q)) &&
    (!status || s.status === status)
  );
  if (!allSubmissions.length) {
    document.getElementById('js-submissions-table').innerHTML = `<div class="adm-table-empty">No submissions yet. Create the submissions table via the SQL editor first.</div>`;
    return;
  }
  if (!list.length) {
    document.getElementById('js-submissions-table').innerHTML = '<div class="adm-table-empty">No submissions match filters.</div>';
    return;
  }
  const badge = s => ({ pending:'<span class="adm-badge adm-badge--amber">Pending</span>', approved:'<span class="adm-badge adm-badge--green">Approved</span>', rejected:'<span class="adm-badge adm-badge--red">Rejected</span>' }[s] || `<span class="adm-badge">${s}</span>`);
  const rows = list.map(s => `
    <tr>
      <td><strong>${s.title||s.name||'—'}</strong><div style="font-size:.75rem;color:var(--adm-mid)">${s.contact_email||''}</div></td>
      <td><span class="adm-badge adm-badge--blue">${s.type||'—'}</span></td>
      <td>${badge(s.status)}</td>
      <td style="font-size:.78rem;color:var(--adm-mid)">${fmtDate(s.created_at)}</td>
      <td style="display:flex;gap:.3rem">
        <button class="adm-btn adm-btn--sm" style="background:var(--adm-green)" onclick="updateSub('${s.id}','approved')">✓</button>
        <button class="adm-btn adm-btn--sm" style="background:var(--adm-red)"   onclick="updateSub('${s.id}','rejected')">✕</button>
      </td>
    </tr>`).join('');
  document.getElementById('js-submissions-table').innerHTML = `
    <table class="adm-table">
      <thead><tr><th>Submission</th><th>Type</th><th>Status</th><th>Received</th><th>Actions</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function updateSub(id, status) {
  await db.from('submissions').update({ status }).eq('id', id);
  const s = allSubmissions.find(x => x.id === id);
  if (s) s.status = status;
  renderSubmissions();
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}

window.openDrawer = openDrawer;
window.updateSub  = updateSub;

// Auto-open edit drawer if ?edit=ID in URL (e.g. from the FAB on article pages)
const _editParam = new URLSearchParams(window.location.search).get('edit');
if (_editParam) {
  // Wait for articles to load then open drawer
  const _waitAndOpen = setInterval(() => {
    if (document.querySelector('.adm-table-row')) {
      clearInterval(_waitAndOpen);
      openDrawer(_editParam);
    }
  }, 200);
  setTimeout(() => clearInterval(_waitAndOpen), 5000); // give up after 5s
}
</script>
</body>
</html>
