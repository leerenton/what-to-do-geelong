  <meta charset="UTF-8" />

  <title>My Account — What To Do Geelong</title>

  <style>
    .acct-hero {
      background: var(--dark);
      color: var(--white);
      padding: 2rem var(--gutter) 1.75rem;
    }
    .acct-hero__inner { display: flex; align-items: center; gap: 1rem; }
    .acct-avatar-lg {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--teal);
      color: var(--dark);
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .acct-hero__name { font-family: var(--font-head); font-size: 1.3rem; font-weight: 900; }
    .acct-hero__email { font-size: .85rem; color: rgba(255,255,255,.6); margin-top: .15rem; }
    .acct-hero__since { font-size: .78rem; color: rgba(255,255,255,.4); margin-top: .2rem; }

    .acct-section { padding: 1.5rem 0; border-bottom: 1px solid var(--border); }
    .acct-section:last-child { border-bottom: none; }
    .acct-section-title {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 800;
      color: var(--dark);
      display: flex; align-items: center; gap: .4rem;
      margin-bottom: 1rem;
    }
    .acct-section-title .material-symbols-rounded { color: var(--teal); font-size: 1.2rem; }

    .acct-stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: .75rem; }
    .acct-stat {
      background: var(--cream);
      border-radius: var(--radius-md);
      padding: .9rem;
      text-align: center;
    }
    .acct-stat__num { font-family: var(--font-head); font-size: 1.6rem; font-weight: 900; color: var(--teal); }
    .acct-stat__label { font-size: .72rem; color: var(--mid); margin-top: .2rem; }

    .acct-biz-list { display: flex; flex-direction: column; gap: .65rem; }
    .acct-biz-card {
      display: flex; align-items: center; gap: .85rem;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: .9rem 1rem;
      text-decoration: none; color: inherit;
      transition: box-shadow .15s;
    }
    .acct-biz-card:hover { box-shadow: var(--shadow-sm); }
    .acct-biz-card__icon {
      width: 42px; height: 42px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }
    .acct-biz-card__name { font-family: var(--font-head); font-size: .95rem; font-weight: 800; color: var(--dark); }
    .acct-biz-card__meta { font-size: .78rem; color: var(--mid); }
    .acct-biz-card__plan {
      margin-left: auto;
      font-size: .65rem;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: var(--radius-pill);
      padding: .2rem .55rem;
    }
    .acct-biz-card__plan--free { background: var(--border); color: var(--mid); }
    .acct-biz-card__plan--featured { background: var(--teal); color: var(--dark); }
    .acct-biz-card__plan--gold { background: #fef3c7; color: #92400e; }

    .acct-prefs { display: flex; flex-wrap: wrap; gap: .4rem; }
    .acct-pref-chip {
      background: var(--teal-lt);
      color: var(--teal-d);
      border-radius: var(--radius-pill);
      padding: .25rem .75rem;
      font-size: .8rem;
      font-weight: 600;
    }
    .acct-menu-list { display: flex; flex-direction: column; }
    .acct-menu-item {
      display: flex; align-items: center; gap: .6rem;
      padding: .8rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--dark);
      font-size: .9rem;
      cursor: pointer;
      background: none; border-left: none; border-right: none; border-top: none; width: 100%; text-align: left;
      font-family: var(--font-body);
    }
    .acct-menu-item:last-child { border-bottom: none; }
    .acct-menu-item .material-symbols-rounded { color: var(--teal); font-size: 1.1rem; }
    .acct-menu-item__arrow { margin-left: auto; color: var(--mid); font-size: 1rem; }
    .acct-menu-item--danger { color: #e76f51; }
    .acct-menu-item--danger .material-symbols-rounded { color: #e76f51; }

    /* Digest toggle */
    .digest-toggle-row {
      display: flex; align-items: center; gap: .85rem;
      cursor: pointer; user-select: none;
    }
    .digest-toggle-row input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .digest-toggle-wrap { flex-shrink: 0; }
    .digest-toggle-track {
      display: inline-flex; align-items: center;
      width: 44px; height: 24px; border-radius: 12px;
      background: var(--border); transition: background .2s;
      position: relative;
    }
    .digest-toggle-thumb {
      position: absolute; left: 2px; width: 20px; height: 20px; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.18);
      transition: transform .2s;
    }
    input[type="checkbox"]:checked ~ .digest-toggle-track { background: var(--teal); }
    input[type="checkbox"]:checked ~ .digest-toggle-track .digest-toggle-thumb { transform: translateX(20px); }
    .digest-toggle-text { font-size: .9rem; font-weight: 600; color: var(--dark); }
  </style>
