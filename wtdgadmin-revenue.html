<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revenue — WTDG Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="wtdgadmin.css?v=1" />
  <meta name="robots" content="noindex, nofollow" />
</head>
<body class="adm-body">

<div class="adm-layout">
  <aside class="adm-sidebar" id="js-adm-sidebar"></aside>

  <div class="adm-main">
    <div class="adm-topbar">
      <span class="adm-topbar__title" id="js-adm-page-title">Revenue</span>
      <div class="adm-topbar__right">
        <div class="adm-date-filter" id="js-rev-date-filter">
          <button class="adm-date-btn active" data-period="30d">30 Days</button>
          <button class="adm-date-btn" data-period="90d">90 Days</button>
          <button class="adm-date-btn" data-period="ytd">YTD</button>
        </div>
      </div>
    </div>

    <div class="adm-content" id="js-rev-content">
      <div style="color:var(--adm-mid)">Loading revenue data…</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js?v=2"></script>
<script src="wtdgadmin.js?v=1"></script>
<script src="wtdgadmin-shell.js?v=1"></script>
<script>
let revPeriod = '30d';

document.addEventListener('DOMContentLoaded', async () => {
  const admin = await requireAdminAuth();
  if (!admin) return;
  initAdminShell('Revenue');
  setupDateFilter();
  await loadRevenue();
});

function setupDateFilter() {
  document.querySelectorAll('#js-rev-date-filter .adm-date-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      document.querySelectorAll('#js-rev-date-filter .adm-date-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      revPeriod = btn.dataset.period;
      await loadRevenue();
    });
  });
}

async function loadRevenue() {
  const content = document.getElementById('js-rev-content');
  content.innerHTML = '<div style="color:var(--adm-mid)">Calculating…</div>';

  const { PRICING } = window.wtdgAdminAuth;
  const { from, to } = getDateRange(revPeriod, '', '');
  const fromDate = new Date(from);

  const { data: bizData } = await db.from('businesses').select('id,name,subscription_tier,is_claimed,created_at');
  const biz = bizData || [];

  // Current MRR by tier
  const tiers = ['free', 'starter', 'growth', 'premium'];
  const tierCounts = {};
  tiers.forEach(t => { tierCounts[t] = 0; });
  biz.forEach(b => {
    const t = b.subscription_tier || 'free';
    if (tierCounts[t] !== undefined) tierCounts[t]++;
    else tierCounts['free']++;
  });

  const mrr = tiers.reduce((s, t) => s + (tierCounts[t] * (PRICING[t] || 0)), 0);
  const arr = mrr * 12;
  const paidCount = biz.filter(b => b.subscription_tier && b.subscription_tier !== 'free').length;

  // New paid in period
  const newPaidInPeriod = biz.filter(b => {
    const t = b.subscription_tier;
    return t && t !== 'free' && new Date(b.created_at) >= fromDate;
  }).length;

  // Revenue in period (approximation: MRR × months)
  const days = Math.max(1, Math.round((new Date(to) - fromDate) / 864e5));
  const periodRevenue = Math.round(mrr * (days / 30));

  // Per-tier MRR
  const tierRevenue = tiers.map(t => ({ tier: t, count: tierCounts[t], price: PRICING[t]||0, rev: (tierCounts[t])*(PRICING[t]||0) }));

  // Revenue projection (3 months, 6 months, 12 months)
  // Assumes current MRR stays flat (conservative)
  const proj3  = mrr * 3;
  const proj6  = mrr * 6;
  const proj12 = mrr * 12;

  // Paying businesses table
  const paidBiz = biz.filter(b => b.subscription_tier && b.subscription_tier !== 'free')
    .sort((a,b) => (PRICING[b.subscription_tier]||0) - (PRICING[a.subscription_tier]||0));

  content.innerHTML = `
    <!-- Headline metrics -->
    <div class="adm-stats" style="margin-bottom:1.75rem">
      ${sc('MRR', '$'+mrr.toLocaleString(), 'Monthly Recurring Revenue', 'green')}
      ${sc('ARR', '$'+arr.toLocaleString(), 'Annual run rate')}
      ${sc('Paid Accounts', paidCount, '', 'teal')}
      ${sc('New Paid (period)', newPaidInPeriod, '', '')}
      ${sc('Period Revenue', '$'+periodRevenue.toLocaleString(), `~${days} days`, '')}
    </div>

    <!-- Tier breakdown -->
    <div class="adm-section">
      <div class="adm-section__header"><span class="adm-section__title">Revenue by Tier</span></div>
      <div class="adm-rev-tiers">
        ${tierRevenue.map(t => `
          <div class="adm-tier-card">
            <div class="adm-tier-card__name">${t.tier}</div>
            <div class="adm-tier-card__count">${t.count} <span style="font-size:1rem;font-weight:500;color:var(--adm-mid)">listings</span></div>
            <div class="adm-tier-card__price">${t.price > 0 ? `$${t.price}/mo each` : 'Free plan'}</div>
            <div class="adm-tier-card__rev">${t.rev > 0 ? `$${t.rev.toLocaleString()}/mo` : '—'}</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Revenue projection -->
    <div class="adm-section">
      <div class="adm-section__header"><span class="adm-section__title">Revenue Projection (flat MRR)</span></div>
      <div class="adm-stats" style="margin-bottom:1.5rem">
        ${sc('3 months',  '$'+proj3.toLocaleString(),  'Conservative estimate')}
        ${sc('6 months',  '$'+proj6.toLocaleString(),  'Conservative estimate')}
        ${sc('12 months', '$'+proj12.toLocaleString(), '= ARR', 'teal')}
      </div>
      <p style="font-size:.78rem;color:var(--adm-mid)">Projections assume no churn and no new upgrades. Actual revenue will vary.</p>
    </div>

    <!-- Paying businesses -->
    ${paidBiz.length ? `
    <div class="adm-section">
      <div class="adm-section__header"><span class="adm-section__title">Paid Accounts (${paidBiz.length})</span></div>
      <div class="adm-table-wrap">
        <table class="adm-table">
          <thead><tr><th>Business</th><th>Plan</th><th>Monthly Value</th><th>Since</th></tr></thead>
          <tbody>
            ${paidBiz.map(b => `<tr>
              <td style="font-weight:600">${b.name||'—'}</td>
              <td><span class="adm-badge adm-badge--green">${b.subscription_tier}</span></td>
              <td style="color:var(--adm-teal);font-weight:700">$${(PRICING[b.subscription_tier]||0).toLocaleString()}/mo</td>
              <td style="font-size:.78rem;color:var(--adm-mid)">${fmtDate(b.created_at)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>` : `<div style="color:var(--adm-mid);font-size:.85rem">No paid accounts yet. All businesses are on free plans.</div>`}`;
}

function sc(label, value, sub='', variant='') {
  return `<div class="adm-stat${variant?' adm-stat--'+variant:''}">
    <div class="adm-stat__label">${label}</div>
    <div class="adm-stat__value">${value}</div>
    ${sub?`<div class="adm-stat__sub">${sub}</div>`:''}
  </div>`;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}
</script>
</body>
</html>
