<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Back Soon — What To Do Geelong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f8f7f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1.25rem;
      display: block;
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 900;
      color: #1a1a2e;
      margin-bottom: .75rem;
      line-height: 1.1;
    }
    h1 span { color: #2ab4a0; }
    p {
      color: #6b7280;
      font-size: 1.05rem;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 999px;
      padding: .55rem 1.1rem;
      font-size: .85rem;
      font-weight: 600;
      color: #374151;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2ab4a0;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.7); }
    }
  </style>
</head>
<body>
  <img src="/assets/logo.jpg" alt="What To Do Geelong" class="logo-img" onerror="this.style.display='none'" />
  <span class="icon">⚙️</span>
  <h1>Essential updates<br>are <span>in progress</span></h1>
  <p>We're making some improvements to the site. We'll be back online shortly — thanks for your patience!</p>
  <div class="pill">
    <span class="dot"></span>
    We're working on it — back very soon
  </div>
</body>
</html>
