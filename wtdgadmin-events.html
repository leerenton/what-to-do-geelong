<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events — WTDG Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="wtdgadmin.css?v=1" />
  <meta name="robots" content="noindex, nofollow" />
</head>
<body class="adm-body">

<div class="adm-layout">
  <aside class="adm-sidebar" id="js-adm-sidebar"></aside>

  <div class="adm-main">
    <div class="adm-topbar">
      <span class="adm-topbar__title" id="js-adm-page-title">Events</span>
      <div class="adm-topbar__right">
        <span id="js-ev-count" style="font-size:.82rem;color:var(--adm-mid)"></span>
      </div>
    </div>

    <div class="adm-content">
      <div class="adm-stats" style="margin-bottom:1.5rem" id="js-ev-stats"></div>

      <div class="adm-toolbar">
        <div class="adm-search">
          <span class="adm-search__icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="search" id="js-ev-search" placeholder="Search events…" />
        </div>
        <select class="adm-select" id="js-ev-cat">
          <option value="">All categories</option>
          <option>Music</option><option>Markets</option><option>Arts</option>
          <option>Food & Drink</option><option>Family</option><option>Outdoors</option>
          <option>Community</option><option>Workshops</option><option>Sports</option>
        </select>
        <select class="adm-select" id="js-ev-sort">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="event-date">By event date</option>
        </select>
      </div>

      <div class="adm-table-wrap" id="js-ev-table">
        <div class="adm-table-empty">Loading events…</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js?v=2"></script>
<script src="wtdgadmin.js?v=1"></script>
<script src="wtdgadmin-shell.js?v=1"></script>
<script>
let allEvents = [];

document.addEventListener('DOMContentLoaded', async () => {
  const admin = await requireAdminAuth();
  if (!admin) return;
  initAdminShell('Events');
  await loadEvents();
  ['js-ev-search','js-ev-cat','js-ev-sort'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', renderEvents);
    document.getElementById(id)?.addEventListener('change', renderEvents);
  });
});

async function loadEvents() {
  const { data, error } = await db.from('events').select('*').order('created_at', { ascending: false });
  if (error) {
    document.getElementById('js-ev-table').innerHTML = '<div class="adm-table-empty">Could not load events.</div>';
    return;
  }
  allEvents = data || [];
  const now = new Date();
  const upcoming = allEvents.filter(e => e.date && new Date(e.date) >= now);
  const past     = allEvents.filter(e => e.date && new Date(e.date) < now);
  const free     = allEvents.filter(e => e.price === 'Free' || e.price === 0 || e.price === '$0');

  document.getElementById('js-ev-count').textContent = `${allEvents.length} total`;
  document.getElementById('js-ev-stats').innerHTML = `
    ${sc('Total Events', allEvents.length)}
    ${sc('Upcoming', upcoming.length, 'teal')}
    ${sc('Past', past.length)}
    ${sc('Free Entry', free.length)}`;

  renderEvents();
}

function sc(label, value, variant='') {
  return `<div class="adm-stat${variant?' adm-stat--'+variant:''}"><div class="adm-stat__label">${label}</div><div class="adm-stat__value">${value}</div></div>`;
}

function renderEvents() {
  const q    = document.getElementById('js-ev-search').value.toLowerCase();
  const cat  = document.getElementById('js-ev-cat').value;
  const sort = document.getElementById('js-ev-sort').value;

  let list = allEvents.filter(e =>
    (e.title||'').toLowerCase().includes(q) &&
    (!cat || (e.category||'') === cat)
  );

  if (sort === 'oldest') list.sort((a,b) => new Date(a.created_at)-new Date(b.created_at));
  else if (sort === 'event-date') list.sort((a,b) => new Date(a.date||0)-new Date(b.date||0));

  if (!list.length) {
    document.getElementById('js-ev-table').innerHTML = '<div class="adm-table-empty">No events found.</div>';
    return;
  }

  const now = new Date();
  const rows = list.map(e => {
    const eDate = e.date ? new Date(e.date) : null;
    const isPast = eDate && eDate < now;
    return `<tr>
      <td>
        <div style="font-weight:600">${e.title || '—'}</div>
        <div style="font-size:.75rem;color:var(--adm-mid)">${e.location || ''}</div>
      </td>
      <td><span class="adm-badge adm-badge--blue">${e.category || '—'}</span></td>
      <td style="font-size:.82rem;color:${isPast?'var(--adm-mid)':'var(--adm-text)'}">${e.date || '—'}</td>
      <td style="font-size:.82rem">${e.price || '—'}</td>
      <td style="color:var(--adm-mid);font-size:.78rem">${fmtDate(e.created_at)}</td>
      <td>
        <a href="event.html?id=${e.id}" target="_blank" class="adm-btn adm-btn--outline adm-btn--sm">View</a>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('js-ev-table').innerHTML = `
    <table class="adm-table">
      <thead><tr><th>Event</th><th>Category</th><th>Date</th><th>Price</th><th>Added</th><th>Actions</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}
</script>
</body>
</html>
