  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="index.html"><img src="/assets/logo.jpg" alt="What To Do" id="js-auth-logo" /></a>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub" id="js-auth-sub">Log in to your account</p>

      <!-- Social logins (placeholders) -->
      <div class="auth-socials">
        <button class="auth-social-btn" id="js-google-btn">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
          Continue with Google
        </button>
        <button class="auth-social-btn" id="js-apple-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><path d="M14.94 9.57c-.02-2.26 1.85-3.35 1.93-3.4-1.05-1.54-2.69-1.75-3.27-1.77-1.39-.14-2.72.82-3.43.82-.71 0-1.8-.8-2.96-.78C5.7 4.46 4.2 5.32 3.37 6.7c-1.69 2.94-.43 7.28 1.21 9.66.8 1.17 1.76 2.48 3.01 2.43 1.21-.05 1.67-.78 3.13-.78 1.46 0 1.88.78 3.15.75 1.3-.02 2.13-1.19 2.92-2.37.93-1.35 1.31-2.67 1.33-2.74-.03-.01-2.56-.98-2.58-3.88z"/><path d="M12.52 2.9c.67-.81 1.12-1.94.99-3.07-.96.04-2.12.64-2.81 1.44-.62.71-1.16 1.85-1.01 2.94 1.07.08 2.16-.54 2.83-1.31z"/></svg>
          Continue with Apple
        </button>
      </div>

      <div class="auth-divider">or continue with email</div>

      <form class="auth-form" id="js-login-form" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="login-email">Email address</label>
          <input class="auth-input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="login-pw">Password</label>
          <div class="auth-pw-wrap">
            <input class="auth-input" type="password" id="login-pw" placeholder="Your password" autocomplete="current-password" required />
            <button type="button" class="auth-pw-toggle" id="js-pw-toggle" aria-label="Show password">
              <span class="material-symbols-rounded">visibility</span>
            </button>
          </div>
        </div>
        <div class="auth-error" id="js-login-error">Incorrect email or password. Try again or <a href="signup.html">create an account</a>.</div>
        <button type="submit" class="auth-submit" id="js-login-btn">Log in</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </div>
      <p class="auth-legal">
        By continuing you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="/login.js"></script>
  <script>
    (async () => {
      if (window._siteConfigPromise) await window._siteConfigPromise;
      const city = window.SITE?.name || 'Geelong';
      const logo = window.SITE?.logoUrl;
      document.title = `Login — What To Do ${city}`;
      const imgEl = document.getElementById('js-auth-logo');
      if (imgEl) {
        imgEl.alt = `What To Do ${city}`;
        if (logo) imgEl.src = logo;
      }
      const sub = document.getElementById('js-auth-sub');
      if (sub) sub.textContent = `Log in to your What To Do ${city} account`;
    })();
  </script>
