<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revenue — WTDG Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/wtdgadmin.css?v=1" />
  <meta name="robots" content="noindex, nofollow" />
</head>
<body class="adm-body">

<div class="adm-layout">
  <aside class="adm-sidebar" id="js-adm-sidebar"></aside>

  <div class="adm-main">
    <div class="adm-topbar">
      <span class="adm-topbar__title" id="js-adm-page-title">Revenue</span>
      <div class="adm-topbar__right">
        <div class="adm-date-filter" id="js-rev-date-filter">
          <button class="adm-date-btn active" data-period="30d">30 Days</button>
          <button class="adm-date-btn" data-period="90d">90 Days</button>
          <button class="adm-date-btn" data-period="ytd">YTD</button>
        </div>
      </div>
    </div>

    <div class="adm-content" id="js-rev-content">
      <div style="color:var(--adm-mid)">Loading revenue data…</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase.js?v=2"></script>
<script src="/wtdgadmin.js?v=1"></script>
<script src="/wtdgadmin-shell.js?v=1"></script>
<script>
let revPeriod = '30d';

document.addEventListener('DOMContentLoaded', async () => {
  const admin = await requireAdminAuth();
  if (!admin) return;
  initAdminShell('Revenue');
  setupDateFilter();
  await loadRevenue();
});

function setupDateFilter() {
  document.querySelectorAll('#js-rev-date-filter .adm-date-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      document.querySelectorAll('#js-rev-date-filter .adm-date-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      revPeriod = btn.dataset.period;
      await loadRevenue();
    });
  });
}

async function loadRevenue() {
  const content = document.getElementById('js-rev-content');
  content.innerHTML = '<div style="color:var(--adm-mid)">Calculating…</div>';

  const { from, to } = getDateRange(revPeriod, '', '');
  const fromDate = new Date(from);
  const toDate   = new Date(to);
  const days     = Math.max(1, Math.round((toDate - fromDate) / 864e5));

  // Fetch businesses (Gold subs) + promotions (one-off ad spend) in parallel
  const [{ data: bizData }, { data: promoData }] = await Promise.all([
    db.from('businesses').select('id,name,is_gold,gold_expires_at,stripe_customer_id,created_at'),
    db.from('promotions').select('id,business_id,package,paid_amount,credits_used,status,created_at,starts_at,ends_at').in('status', ['pending','approved','live']),
  ]);

  const biz    = bizData   || [];
  const promos = promoData || [];

  // ── Gold subscriptions ───────────────────────────────────
  // Gold annual = $249/yr = $20.75/mo   Gold monthly = $25/mo
  // We don't store which plan they're on separately, so approximate:
  // use $249 for annual (gold_expires_at roughly 1yr from created), $25/mo otherwise
  const goldBiz = biz.filter(b => b.is_gold);

  // MRR from Gold: treat each as monthly Gold ($25) for MRR purposes
  // (some may be annual — flag those separately)
  const GOLD_MONTHLY_PRICE = 25;
  const GOLD_ANNUAL_PRICE  = 249;
  const goldMrr = goldBiz.length * GOLD_MONTHLY_PRICE;

  // New Gold in period
  const newGoldInPeriod = goldBiz.filter(b => {
    const d = new Date(b.created_at);
    return d >= fromDate && d <= toDate;
  }).length;

  // ── Promotions (one-off payments) ───────────────────────
  // paid_amount is in cents from Stripe
  const paidPromos = promos.filter(p => p.paid_amount > 0);

  // Total promotion revenue collected ever
  const totalPromoRevenue = paidPromos.reduce((s, p) => s + (p.paid_amount / 100), 0);

  // Promo revenue in selected period (by created_at)
  const periodPromos = paidPromos.filter(p => {
    const d = new Date(p.created_at);
    return d >= fromDate && d <= toDate;
  });
  const periodPromoRevenue = periodPromos.reduce((s, p) => s + (p.paid_amount / 100), 0);

  // Active promos right now
  const now = new Date();
  const activePromos = promos.filter(p => {
    const start = p.starts_at ? new Date(p.starts_at) : null;
    const end   = p.ends_at   ? new Date(p.ends_at)   : null;
    return start && end && start <= now && end >= now;
  });

  // Promo breakdown by package
  const pkgNames = ['boost', 'spotlight', 'premier'];
  const pkgPrices = { boost: 49, spotlight: 99, premier: 199 };
  const pkgBreakdown = pkgNames.map(pkg => {
    const all     = paidPromos.filter(p => p.package === pkg);
    const inPeriod = all.filter(p => { const d = new Date(p.created_at); return d >= fromDate && d <= toDate; });
    const rev      = inPeriod.reduce((s, p) => s + (p.paid_amount / 100), 0);
    return { pkg, count: inPeriod.length, rev, total: all.length };
  });

  // ── Combined metrics ─────────────────────────────────────
  // Period subscription revenue = Gold MRR × (days/30)
  const periodSubRevenue  = Math.round(goldMrr * (days / 30));
  const periodTotalRevenue = periodSubRevenue + periodPromoRevenue;

  // ARR = Gold annual run rate + promotion run rate (annualised from period)
  const promoAnnualised = days > 0 ? Math.round((totalPromoRevenue / Math.max(days, 30)) * 365) : 0;
  const arr = (goldMrr * 12) + promoAnnualised;

  // ── Gold subscribers table ───────────────────────────────
  const goldTable = goldBiz.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  // ── Recent promotions table ──────────────────────────────
  const recentPromos = [...paidPromos]
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
    .slice(0, 20);
  const bizMap = Object.fromEntries(biz.map(b => [b.id, b.name]));

  content.innerHTML = `
    <!-- Headline metrics -->
    <div class="adm-stats" style="margin-bottom:1.75rem">
      ${sc('Gold MRR',       '$'+goldMrr.toLocaleString(),              'Monthly recurring (Gold subs)', 'green')}
      ${sc('Gold ARR',       '$'+(goldMrr*12).toLocaleString(),         'Annual run rate')}
      ${sc('Gold Members',   goldBiz.length,                            `+${newGoldInPeriod} this period`, 'teal')}
      ${sc('Promo Revenue',  '$'+Math.round(periodPromoRevenue).toLocaleString(), `This period (${days}d)`)}
      ${sc('Total Period',   '$'+Math.round(periodTotalRevenue).toLocaleString(), 'Subs + promotions', 'green')}
    </div>

    <!-- Subscriptions vs Promotions -->
    <div class="adm-stats" style="margin-bottom:1.75rem">
      ${sc('Active Gold Subs',    goldBiz.length,       '$'+GOLD_MONTHLY_PRICE+'/mo each')}
      ${sc('Active Promotions',   activePromos.length,  'Live right now')}
      ${sc('All-time Promo Rev',  '$'+Math.round(totalPromoRevenue).toLocaleString(), 'Boost + Spotlight + Premier')}
    </div>

    <!-- Promotion breakdown by package -->
    <div class="adm-section">
      <div class="adm-section__header"><span class="adm-section__title">Promotion Revenue This Period</span></div>
      <div class="adm-rev-tiers">
        ${pkgBreakdown.map(p => `
          <div class="adm-tier-card">
            <div class="adm-tier-card__name">${p.pkg[0].toUpperCase()+p.pkg.slice(1)}</div>
            <div class="adm-tier-card__count">${p.count} <span style="font-size:1rem;font-weight:500;color:var(--adm-mid)">sold</span></div>
            <div class="adm-tier-card__price">$${pkgPrices[p.pkg]} each</div>
            <div class="adm-tier-card__rev">${p.rev > 0 ? '$'+p.rev.toLocaleString() : '—'}</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Revenue projection -->
    <div class="adm-section">
      <div class="adm-section__header"><span class="adm-section__title">Projection (flat Gold MRR, no new promo sales)</span></div>
      <div class="adm-stats" style="margin-bottom:1rem">
        ${sc('3 months',  '$'+(goldMrr*3).toLocaleString(),  'Gold subs only')}
        ${sc('6 months',  '$'+(goldMrr*6).toLocaleString(),  'Gold subs only')}
        ${sc('12 months', '$'+(goldMrr*12).toLocaleString(), '= Gold ARR', 'teal')}
      </div>
      <p style="font-size:.78rem;color:var(--adm-mid)">Projections assume no churn and no new upgrades. Promotion revenue is excluded as it is one-off.</p>
    </div>

    <!-- Gold subscribers -->
    <div class="adm-section">
      <div class="adm-section__header"><span class="adm-section__title">Gold Members (${goldBiz.length})</span></div>
      ${goldBiz.length ? `
      <div class="adm-table-wrap">
        <table class="adm-table">
          <thead><tr><th>Business</th><th>Plan</th><th>Gold Expires</th><th>Since</th></tr></thead>
          <tbody>
            ${goldTable.map(b => {
              const exp    = b.gold_expires_at ? new Date(b.gold_expires_at) : null;
              const expStr = exp ? exp.toLocaleDateString('en-AU', {day:'numeric',month:'short',year:'numeric'}) : 'Unknown';
              const isAnnual = exp && (exp - new Date(b.created_at)) > (300 * 864e5);
              return `<tr>
                <td style="font-weight:600">${b.name||'—'}</td>
                <td><span class="adm-badge adm-badge--green">Gold ${isAnnual ? 'Annual' : 'Monthly'}</span></td>
                <td style="font-size:.78rem;color:var(--adm-mid)">${expStr}</td>
                <td style="font-size:.78rem;color:var(--adm-mid)">${fmtDate(b.created_at)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>` : `<p style="font-size:.85rem;color:var(--adm-mid)">No Gold members yet.</p>`}
    </div>

    <!-- Recent promotion payments -->
    <div class="adm-section">
      <div class="adm-section__header"><span class="adm-section__title">Recent Promotion Payments</span></div>
      ${recentPromos.length ? `
      <div class="adm-table-wrap">
        <table class="adm-table">
          <thead><tr><th>Business</th><th>Package</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
          <tbody>
            ${recentPromos.map(p => `<tr>
              <td style="font-weight:600">${bizMap[p.business_id] || p.business_id}</td>
              <td>${p.package ? p.package[0].toUpperCase()+p.package.slice(1) : '—'}</td>
              <td style="color:var(--adm-teal);font-weight:700">$${(p.paid_amount/100).toFixed(0)}</td>
              <td style="font-size:.78rem;color:var(--adm-mid)">${fmtDate(p.created_at)}</td>
              <td><span class="adm-badge adm-badge--${p.status==='live'?'green':p.status==='pending'?'yellow':'grey'}">${p.status}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>` : `<p style="font-size:.85rem;color:var(--adm-mid)">No promotion payments recorded yet.</p>`}
    </div>`;
}

function sc(label, value, sub='', variant='') {
  return `<div class="adm-stat${variant?' adm-stat--'+variant:''}">
    <div class="adm-stat__label">${label}</div>
    <div class="adm-stat__value">${value}</div>
    ${sub?`<div class="adm-stat__sub">${sub}</div>`:''}
  </div>`;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}
</script>
</body>
</html>
